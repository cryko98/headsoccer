<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Impostor Station — social deduction game</title>
  <meta name="description" content="Impostor Station — a browser social-deduction game. Do tasks, find the impostors, vote them out." />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><circle cx='32' cy='26' r='18' fill='%23e2333a'/><ellipse cx='36' cy='24' rx='9' ry='7' fill='%239fd3ff'/><rect x='18' y='40' width='28' height='16' rx='8' fill='%23b3262c'/></svg>" />
</head>
<body>
  <div id="game-shell">
    <canvas id="game-canvas"></canvas>

    <!-- Top bar -->
    <div id="topbar">
      <button id="menu-btn" class="top-btn">MENU</button>
      <button id="mute-btn" class="top-btn">SOUND ON</button>
    </div>

    <!-- In-game HUD -->
    <div id="hud">
      <div id="taskbar"><div id="taskbar-fill"></div><span id="taskbar-pct">TASKS 0%</span></div>
      <div id="alarm"></div>
      <div id="tasklist"></div>
      <div id="actions"></div>
      <div id="ghost-banner">GHOST</div>
      <canvas id="minimap" width="300" height="200"></canvas>
    </div>

    <!-- Overlays -->
    <div id="role-overlay" class="overlay"></div>
    <div id="task-overlay" class="overlay"></div>
    <div id="meeting-overlay" class="overlay"></div>
    <div id="cameras-overlay" class="overlay"></div>
    <div id="sab-menu" class="overlay"></div>
    <div id="panel-overlay" class="overlay"></div>
    <div id="over-overlay" class="overlay"></div>
    <div id="menu" class="overlay"></div>
    <div id="toast"></div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/input.js"></script>
  <script src="js/map.js"></script>
  <script src="js/entities.js"></script>
  <script src="js/tasks.js"></script>
  <script src="js/ai.js"></script>
  <script src="js/meeting.js"></script>
  <script src="js/game.js"></script>
  <script src="js/ui.js"></script>
  <script>
    window.addEventListener('DOMContentLoaded', () => {
      Game.init(document.getElementById('game-canvas'));
      UI.init();
      const resume = () => { Sound.init(); Sound.resume(); window.removeEventListener('pointerdown', resume); };
      window.addEventListener('pointerdown', resume);
    });
  </script>
</body>
</html>
